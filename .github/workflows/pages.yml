name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare frontend files
        run: |
          mkdir -p dist
          cp nova-mind-v3/index.html dist/
          cp nova-mind-v3/robots.txt dist/ 2>/dev/null || true
          cp nova-mind-v3/sitemap.xml dist/ 2>/dev/null || true
          cp -r nova-mind-v3/css dist/
          cp -r nova-mind-v3/js dist/
          cp -r nova-mind-v3/pages dist/
          cp -r nova-mind-v3/img dist/
          echo "novamindai.co.uk" > dist/CNAME

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
